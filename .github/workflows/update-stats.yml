name: Update tournament statistics

on:
  workflow_dispatch:
    inputs:
      reset:
        description: 'Rebuild all tournament data from scratch'
        required: false
        type: boolean
        default: false
  schedule:
    - cron: '17 3 * * *'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check update window
        id: window
        shell: bash
        run: |
          enabled=true
          if [[ "${{ github.event_name }}" == "schedule" && "$(date -u +%F)" > "2026-08-05" ]]; then
            enabled=false
          fi
          echo "enabled=$enabled" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        if: steps.window.outputs.enabled == 'true'
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        if: steps.window.outputs.enabled == 'true'
        with:
          python-version: '3.12'
          cache: pip

      - name: Install parser dependencies
        if: steps.window.outputs.enabled == 'true'
        run: pip install -r requirements.txt

      - name: Update JSON dataset
        if: steps.window.outputs.enabled == 'true'
        env:
          STRATZ_TOKEN: ${{ secrets.STRATZ_TOKEN }}
          RESET_DATA: ${{ inputs.reset }}
        run: |
          if [[ "$RESET_DATA" == "true" ]]; then
            python main.py --reset
          else
            python main.py
          fi

      - name: Commit changed data
        if: steps.window.outputs.enabled == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add players_stat.json leagues.json dataset_meta.json
          if git diff --cached --quiet; then
            echo "No dataset changes."
          else
            git commit -m "Update TI 2026 fantasy data"
            git push
          fi
